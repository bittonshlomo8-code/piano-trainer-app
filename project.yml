name: PianoTrainer

options:
  bundleIdPrefix: com.pianotrainer
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-O"

configs:
  Debug: debug
  Release: release

schemes:
  PianoTrainer:
    build:
      targets:
        MacApp: all
    run:
      config: Debug
      executable: MacApp
    test:
      config: Debug
      targets:
        - name: PianoTranscriptionKitTests
          parallelizable: true
          randomExecutionOrder: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:

  # ── PianoTranscriptionKit library ─────────────────────────────────────────
  PianoTranscriptionKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/PianoTranscriptionKit
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_MODULE_NAME: PianoTranscriptionKit
        DEFINES_MODULE: YES
        INSTALL_PATH: "@rpath"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Accelerate.framework
      - sdk: CoreMIDI.framework
      - sdk: AppKit.framework

  # ── MacApp executable ──────────────────────────────────────────────────────
  MacApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/MacApp
        createIntermediateGroups: true
    resources:
      - path: Resources/AppIcon.icns
        optional: true
    info:
      path: Resources/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    entitlements:
      path: Resources/MacApp.entitlements
    settings:
      base:
        PRODUCT_NAME: "Piano Trainer"
        PRODUCT_BUNDLE_IDENTIFIER: com.pianotrainer.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/MacApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: PianoTranscriptionKit
        embed: true
        codeSign: true
      - sdk: AVFoundation.framework
      - sdk: AppKit.framework

  # ── Tests ──────────────────────────────────────────────────────────────────
  PianoTranscriptionKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PianoTranscriptionKitTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pianotrainer.tests
    dependencies:
      - target: PianoTranscriptionKit
